services:
  db:
    image: postgres:16
    container_name: skillbridge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: skillbridge_ai
      POSTGRES_USER: skillbridge
      POSTGRES_PASSWORD: skillbridge
    ports:
      - "5432:5432"
    volumes:
      - skillbridge_postgres_data:/var/lib/postgresql/data

volumes:
  skillbridge_postgres_data:

